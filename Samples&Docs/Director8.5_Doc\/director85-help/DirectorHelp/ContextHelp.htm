<HTML>
<HEAD>
<TITLE>Director Help</TITLE>

<SCRIPT>

/* Functions for search */
browser = navigator.appName;
os = navigator.platform;
ie = "Microsoft Internet Explorer";
mac = "MacPPC";

function loadSearch() {
	if( !( browser == ie  && os == mac )) {
		parent.search.location.href = "../search.htm";
	}
}

function killSearch() {
  var searcher;
  searcher=parent.search.document.searchApplet;
  if (searcher) {
    searcher.destroy();
  }
}

</SCRIPT>

</HEAD>

<frameset cols="224,*" frameborder=0 border=0 framespacing=0 onload="loadSearch()" onunload="killSearch()">
